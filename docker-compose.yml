version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mes_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - mes_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mes_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MQTT_BROKER_HOST: mosquitto
      SQL_SERVER_DRIVER: "ODBC Driver 18 for SQL Server"
    depends_on:
      - mosquitto
    restart: unless-stopped
    volumes:
      - ./backend:/app
    networks:
      - mes_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "DESKTOP-PMRMSPT:host-gateway"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: mes_grafana
    ports:
      - "3010:3000"
    env_file:
      - .env
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/home_dashboard.json
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mes_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "DESKTOP-PMRMSPT:host-gateway"

volumes:
  mosquitto_data:
  mosquitto_log:
  grafana_data:

networks:
  mes_net:
    driver: bridge
