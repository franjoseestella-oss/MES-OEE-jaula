<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGISNEXT — ASISTENTE MES/OEE</title>
<style>
  :root {
    --bg:        #000000;
    --card-bg:   rgba(18,18,18,0.92);
    --border:    #1F1F1F;
    --text:      #FFFFFF;
    --label:     #8B92A0;
    --green:     #2FD06A;
    --red:       #E32636;
    --amber:     #F4A623;
    --cyan:      #25C9D6;
    --magenta:   #FF2E92;
    --radius:    8px;
    --font: 'Segoe UI', 'Arial Narrow', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: rgba(0,0,0,0.97);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 32px; height: 32px;
    border: 2px solid var(--cyan);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--cyan);
    letter-spacing: 0.05em;
  }
  .header-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }
  .header-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--label);
    text-transform: uppercase;
    margin-left: 4px;
  }
  .header-spacer { flex: 1; }
  .status-pill {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--green);
    color: var(--green);
  }

  /* ── MACHINE SELECTOR ── */
  .machine-bar {
    background: rgba(10,10,10,0.9);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .machine-bar label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--label);
  }
  .machine-bar select {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    outline: none;
  }
  .machine-bar select:focus { border-color: var(--cyan); }

  /* ── CHAT AREA ── */
  .chat-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 16px 24px 0;
    gap: 12px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 820px;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .msg.user .avatar    { background: var(--magenta); color: #fff; }
  .msg.assistant .avatar { background: var(--cyan); color: var(--bg); }

  .bubble {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.65;
    max-width: 700px;
  }
  .msg.user .bubble {
    border-color: rgba(255,46,146,0.35);
    background: rgba(255,46,146,0.07);
  }
  .msg.assistant .bubble {
    border-color: rgba(37,201,214,0.25);
  }

  /* Markdown dentro del bubble */
  .bubble h1,.bubble h2,.bubble h3 {
    font-size: 13px; font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 10px 0 4px;
  }
  .bubble table {
    border-collapse: collapse;
    width: 100%;
    margin: 8px 0;
    font-size: 12px;
  }
  .bubble th {
    background: rgba(37,201,214,0.1);
    border: 1px solid var(--border);
    padding: 5px 10px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cyan);
  }
  .bubble td {
    border: 1px solid var(--border);
    padding: 5px 10px;
    color: var(--text);
  }
  .bubble code {
    background: rgba(37,201,214,0.08);
    border: 1px solid rgba(37,201,214,0.2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 12px;
    color: var(--cyan);
    font-family: 'Consolas', monospace;
  }
  .bubble strong { color: var(--amber); }
  .bubble em { color: var(--label); }
  .bubble ul,.bubble ol { padding-left: 18px; }
  .bubble li { margin: 3px 0; }
  .bubble p { margin: 6px 0; }

  .ts {
    font-size: 9px;
    color: var(--label);
    letter-spacing: 0.05em;
    margin-top: 4px;
    text-align: right;
  }
  .msg.user .ts { text-align: right; }
  .msg.assistant .ts { text-align: left; }

  /* Typing indicator */
  .typing-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    animation: blink 1.2s infinite ease-in-out;
    margin: 0 2px;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 14px 24px 18px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.97);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--cyan); }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    resize: none;
    min-height: 20px;
    max-height: 120px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--label); }

  .send-btn {
    background: var(--cyan);
    border: none;
    border-radius: var(--radius);
    color: var(--bg);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Quick actions */
  .quick-actions {
    padding: 0 24px 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .qa-chip {
    background: rgba(37,201,214,0.08);
    border: 1px solid rgba(37,201,214,0.3);
    color: var(--cyan);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .qa-chip:hover { background: rgba(37,201,214,0.18); }

  /* Scrollbar */
  .chat-wrap::-webkit-scrollbar { width: 4px; }
  .chat-wrap::-webkit-scrollbar-track { background: transparent; }
  .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">LN</div>
  <span class="header-title">Logisnext</span>
  <span class="header-sub">/ Asistente MES·OEE</span>
  <div class="header-spacer"></div>
  <div class="status-pill">EN LÍNEA</div>
</header>

<div class="machine-bar">
  <label>Máquina activa</label>
  <select id="machineSelect">
    <option value="">— Todas —</option>
  </select>
</div>

<div class="chat-wrap" id="chatWrap"></div>

<div class="quick-actions" id="quickActions">
  <div class="qa-chip" onclick="quickSend('¿Cuál es el OEE del turno actual?')">OEE turno</div>
  <div class="qa-chip" onclick="quickSend('Dame el OEE de hoy completo')">OEE hoy</div>
  <div class="qa-chip" onclick="quickSend('¿Cómo va el plan de producción hoy?')">Pacing / Plan</div>
  <div class="qa-chip" onclick="quickSend('¿Cómo van los tiempos en el distribuidor?')">OEE Distribuidor</div>
  <div class="qa-chip" onclick="quickSend('¿Cuáles son las principales causas de parada en las últimas 8 horas?')">Causas parada</div>
  <div class="qa-chip" onclick="quickSend('Genera un resumen del turno actual')">Resumen turno</div>
  <div class="qa-chip" onclick="quickSend('¿Qué máquinas están registradas?')">Listar máquinas</div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea id="msgInput" placeholder="Pregunta sobre OEE, paradas, producción…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">Enviar</button>
</div>

<script>
const chatWrap = document.getElementById('chatWrap');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const machineSelect = document.getElementById('machineSelect');
let history = [];
let isLoading = false;

function now() {
  return new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
}

function addMsg(role, contentHtml, rawText) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const label = role === 'user' ? 'OP' : 'AI';
  wrap.innerHTML = `
    <div class="avatar">${label}</div>
    <div>
      <div class="bubble">${contentHtml}</div>
      <div class="ts">${now()}</div>
    </div>`;
  chatWrap.appendChild(wrap);
  chatWrap.scrollTop = chatWrap.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'typingMsg';
  wrap.innerHTML = `
    <div class="avatar">AI</div>
    <div><div class="bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div></div>`;
  chatWrap.appendChild(wrap);
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addMsg('user', escapeHtml(text), text);
  history.push({role:'user', content: text});

  addTyping();

  try {
    const body = {
      messages: history,
      machine_id: machineSelect.value || null,
    };
    const resp = await fetch('/api/v1/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    removeTyping();
    addMsg('assistant', data.reply_html, data.reply);
    history.push({role:'assistant', content: data.reply});
  } catch(e) {
    removeTyping();
    addMsg('assistant', `<span style="color:var(--red)">Error al conectar con el servidor: ${e.message}</span>`, '');
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

function quickSend(text) {
  msgInput.value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function loadMachines() {
  try {
    const resp = await fetch('/api/v1/machines');
    if (!resp.ok) return;
    const machines = await resp.json();
    machines.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.machine_id;
      opt.textContent = `${m.machine_id} — ${m.state}`;
      machineSelect.appendChild(opt);
    });
  } catch(_) {}
}

// Mensaje de bienvenida
addMsg('assistant',
  '<strong>Bienvenido al Asistente MES/OEE de Logisnext.</strong><br>' +
  'Puedo consultarte sobre el OEE en tiempo real, paradas, producción y generar reportes de turno.<br>' +
  'Selecciona una máquina arriba o usa los accesos rápidos para empezar.',
  ''
);
loadMachines();
</script>
</body>
</html>
